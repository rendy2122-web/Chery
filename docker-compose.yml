services:
  app:
    image: node:20-bullseye-slim
    container_name: chery-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # Named volume for node_modules — keeps it isolated from the host bind mount
      - app_node_modules:/app/node_modules
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        npm ci --omit=dev --ignore-scripts &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        NODE_ENV=production node_modules/.bin/next start
      "
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app_node_modules:
