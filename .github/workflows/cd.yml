name: CD

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

# Only deploy when CI passed — never on failure
jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db

      - name: Run database migrations
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          NEXTAUTH_SECRET: test-secret-key-for-ci-only-32-characters-long
          NEXTAUTH_URL: http://localhost:3000
          ADMIN_EMAIL: test@example.com
          ADMIN_PASSWORD: testpassword123
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SKIP_DYNAMIC_SITEMAP: "true"

      - name: Package deployment bundle
        run: |
          tar -czf deploy.tar.gz \
            .next/ \
            Public/ \
            package.json \
            package-lock.json \
            next.config.js \
            prisma/schema.prisma \
            docker-compose.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: deploy.tar.gz
          retention-days: 7

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: SSH connectivity preflight
        run: |
          timeout 15 bash -c "cat < /dev/null > /dev/tcp/${{ vars.DEPLOY_HOST }}/${{ vars.DEPLOY_PORT || 22 }}"
          echo "TCP reachable"

      - name: Upload bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy.tar.gz
          target: ${{ vars.DEPLOY_PATH }}
          timeout: 120s
          command_timeout: 10m

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}

            # Extract bundle (overwrites .next/, Public/, package.json, docker-compose.yml, etc.)
            tar -xzf deploy.tar.gz

            # Pull fresh image and restart
            docker compose pull app 2>/dev/null || true
            docker compose up -d --force-recreate

            # Clean up old images
            docker image prune -f

            echo "Deployment complete"
